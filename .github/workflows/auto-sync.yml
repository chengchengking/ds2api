name: Auto Sync Upstream

on:
  schedule:
    # 每天北京时间中午 11 点自动执行一次检查 (UTC时间凌晨3点)
    - cron: '0 3 * * *' 
  workflow_dispatch: # 保留一个可以随时手动触发的开关

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Auto Merge Upstream
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'actions@github.com'
          
          # 添加原作者的仓库地址
          git remote add upstream https://github.com/CJackHwang/ds2api.git
          git fetch upstream
          
          # 自动合并最新代码
          git checkout main
          git merge upstream/main --no-edit || echo "Merge conflict or no changes, skipping..."
          
          # 推送到你的仓库
          git push origin main
